<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <title>Bay Noise</title>
  <defs>
    <clipPath id="tile">
      <rect width="100" height="100" rx="18.75"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="18.75" fill="#000"/>
  <!-- Fog Signal, simplified for small sizes: same composition as icon.svg
       (scaled 100/512) with strokes beefed up for legibility at 16-32px. -->
  <g clip-path="url(#tile)">
    <circle cx="38.3" cy="61.7" r="54.7" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="5"/>
    <circle cx="38.3" cy="61.7" r="39.1" fill="none" stroke="#fff" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="85.2 34.1 98.8 27.3" stroke-dashoffset="211.4"/>
    <circle cx="38.3" cy="61.7" r="25" fill="none" stroke="#fff" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="130.9 26.2" stroke-dashoffset="85.1"/>
    <circle cx="38.3" cy="61.7" r="12.5" fill="none" stroke="#fff" stroke-width="5"/>
    <circle cx="38.3" cy="61.7" r="7" fill="#fff"/>
    <circle cx="65.9" cy="34.1" r="5" fill="#fff"/>
  </g>
</svg>
